apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rental-price-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mrsddq/rental-price-mlops-pipeline.git
    targetRevision: main
    path: helm/rental-price-api
  destination:
    server: https://kubernetes.default.svc
    namespace: rental-mlops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
