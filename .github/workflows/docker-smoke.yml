name: Docker Smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - Dockerfile
      - .dockerignore
      - requirements.txt
      - docker-compose.yml
      - main.py
      - rental_mlops/**
      - tests/**
      - .github/workflows/docker-smoke.yml
  push:
    branches: [main]
    paths:
      - Dockerfile
      - .dockerignore
      - requirements.txt
      - docker-compose.yml
      - main.py
      - rental_mlops/**
      - tests/**
      - .github/workflows/docker-smoke.yml

permissions:
  contents: read

jobs:
  docker-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t rental-price-mlops-pipeline:smoke .
      - name: Run default compile smoke
        run: docker run --rm rental-price-mlops-pipeline:smoke
      - name: Run tests in Docker
        run: docker run --rm rental-price-mlops-pipeline:smoke python -m unittest discover -s tests
