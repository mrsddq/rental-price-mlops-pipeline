name: CI

on:
  push:
  pull_request:

jobs:
  python-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run unit tests
        run: python -m unittest discover -s tests
      - name: Compile pipeline code
        run: python -m compileall main.py rental_mlops tests
      - name: Run model quality gate
        run: python main.py --no-compile --write-reports --report-dir outputs/reports
      - name: Write model artifact
        run: python main.py --no-compile --write-artifact --artifact-path outputs/model/rental-price-model.pkl
      - name: Compile Kubeflow pipeline
        run: python main.py --compile-only --output /tmp/rental_price_prediction_pipeline.yaml
