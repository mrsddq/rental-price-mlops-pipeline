image:
  repository: ghcr.io/mrsddq/rental-price-mlops-pipeline/api
  tag: "1.0.0"
  pullPolicy: IfNotPresent

model:
  name: rental-price-regressor
  version: "1.0.0"
  stage: staging

replicaCount: 2

service:
  port: 80
  targetPort: 8000

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

serviceMonitor:
  enabled: true
